name: CI

# Green-gate: a PR cannot merge red. Builds the API, the Durable Functions
# project, runs the test suite, AOT-builds the Angular SPA, and smoke-tests the
# running API's tenancy / concurrency / idempotency guarantees. Any non-zero
# step fails the job.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build · test · web · smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # --- .NET: API + Functions + tests ---
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.x'

      - name: Build API
        run: dotnet build api/api.csproj -c Release --nologo

      - name: Build Functions
        run: dotnet build functions/functions.csproj -c Release --nologo

      - name: Test
        run: dotnet test tests/HfcDemo.Tests.csproj -c Release --nologo

      # --- Web: Angular build gate ---
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: web/package-lock.json

      # The SPA is the surface most likely to regress, so every PR builds it and a
      # red build fails the check. `ng build` compiles the WHOLE web/src tree, so the
      # new Back-Office Wave 1 surface (src/app/backoffice/**) is covered automatically
      # — a TypeScript/template error anywhere under backoffice/** fails this gate.
      # Dev configuration on purpose: the prod build inlines Google Fonts over the
      # network and would flake if Fonts is unreachable on a runner. The optimized/prod
      # build is still exercised by screenshots.yml on push to main (and again by
      # post-deploy-e2e on the live deploy), so prod-only build errors still get caught
      # before users do.
      - name: Build SPA (dev config — covers backoffice/** — fails the PR on a red build)
        working-directory: web
        run: |
          npm ci
          npx ng build --configuration development

      # Format report (NON-BLOCKING): prettier rules live in web/package.json but
      # nothing was running them. continue-on-error surfaces drift in the PR checks
      # without blocking merges; once the tree is verified clean, drop the flag to
      # make formatting a hard gate. Pinned to prettier 3 for deterministic output.
      - name: Web format check (prettier · non-blocking)
        if: always()
        working-directory: web
        continue-on-error: true
        run: npx --yes prettier@3 --check "src/**/*.{ts,html,css,json}"

      # Dedicated lint signal for the NEW back-office surface (src/app/backoffice/**).
      # Isolated from the repo-wide check so back-office format drift is visible as its
      # own check rather than buried among legacy drift. NON-BLOCKING for now only
      # because the C1 foundation (PR #48) landed 8 files with pre-existing drift; once
      # the web lane runs `prettier --write src/app/backoffice/**`, drop continue-on-error
      # to make this a HARD gate (this surface is new — it should be held clean from the
      # start). No-op when backoffice/** is absent.
      - name: Lint back-office code (prettier · backoffice/** · flip to blocking once clean)
        if: always()
        working-directory: web
        continue-on-error: true
        run: |
          if [ -d src/app/backoffice ] && \
             find src/app/backoffice -type f \( -name '*.ts' -o -name '*.html' -o -name '*.css' -o -name '*.json' \) | grep -q .; then
            echo "Linting src/app/backoffice/** …"
            npx --yes prettier@3 --check "src/app/backoffice/**/*.{ts,html,css,json}"
          else
            echo "No back-office sources yet (src/app/backoffice/** absent) — gate is a no-op."
          fi

      # --- Smoke: boot the API and assert its guarantees end-to-end ---
      # ASPNETCORE_ENVIRONMENT=Development is required: the /api/dev/token mint
      # the smoke script logs in through is gated to Development (it never ships
      # to prod). A clean runner has no hfc-demo.db, so EnsureCreated() builds the
      # full schema fresh — the rm -f is belt-and-suspenders against any cache.
      - name: Smoke-test API
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          rm -f api/hfc-demo.db
          dotnet run --project api/api.csproj -c Release --no-launch-profile \
            --urls http://localhost:5180 &
          API_PID=$!
          # Wait up to ~60s for the API to come up (untenanted /api/brands).
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5180/api/brands >/dev/null 2>&1; then
              echo "API is up after ${i}s"
              break
            fi
            if ! kill -0 "$API_PID" 2>/dev/null; then
              echo "API process exited before becoming ready"; exit 1
            fi
            sleep 1
          done
          set +e
          API_BASE=http://localhost:5180 ./e2e/smoke-api.sh
          rc=$?
          set -e
          kill "$API_PID" 2>/dev/null || true
          exit $rc
