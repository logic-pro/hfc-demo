name: auto-update-prs

# Closes the one gap in hands-off auto-merge: when `main` moves, any open PR with
# auto-merge armed goes BEHIND and stalls (strict mode requires up-to-date). This
# updates each armed PR's branch (merges main in) so it re-satisfies strict and lands
# on its own once green.
#
# IMPORTANT — re-running CI: GitHub will NOT re-trigger workflows for a branch update
# made with the default GITHUB_TOKEN (recursive-run prevention). For the updated branch
# to actually re-run `ci.yml` (which strict then requires), set a repo secret
# AUTO_MERGE_PAT = a fine-grained PAT with "Contents: read/write" + "Pull requests:
# read/write" on this repo. Without it, branches get updated but CI won't auto-rerun.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', base: 'main', per_page: 100,
            });
            let updated = 0;
            for (const pr of prs) {
              // Only touch PRs the lane has opted into auto-merge on — never surprise-update a draft/WIP.
              if (!pr.auto_merge) { core.info(`skip #${pr.number} ${pr.head.ref} (auto-merge not armed)`); continue; }
              try {
                await github.rest.pulls.updateBranch({ owner, repo, pull_number: pr.number });
                core.info(`updated #${pr.number} ${pr.head.ref}`);
                updated++;
              } catch (e) {
                // 422 = already up to date or a conflict the lane must resolve by hand.
                core.warning(`#${pr.number} ${pr.head.ref}: ${e.message}`);
              }
            }
            core.notice(`auto-update-prs: ${updated} branch(es) updated of ${prs.length} open`);
