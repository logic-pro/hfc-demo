name: keep-warm

# Free-tier cold-start mitigation. An F1/Free App Service unloads its container
# after ~20min idle, so the first hit afterwards 503s / times out. Always On
# would fix this but is only available on Basic (B1)+; on Free this cron pings
# /health every ~10min to keep the container resident — at $0.
#
# Once the app is on Basic+ (SKU=B1 ./infra/deploy.sh, which enables Always On),
# this workflow is redundant and can be disabled from the Actions tab.
#
# Target URL: set repo variable WARM_URL (Settings -> Variables) to the deployed
# base URL; falls back to the current demo host.
on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (GitHub may delay under load)
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to keep warm (overrides the WARM_URL variable)'
        required: false

permissions:
  contents: read

concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /health to keep the container resident
        env:
          BASE: ${{ github.event.inputs.base_url || vars.WARM_URL || 'https://hfcdemo-api-pkz2lysbqoabq.azurewebsites.net' }}
        run: |
          echo "Warming $BASE/health"
          # Generous timeout: if it WAS cold, this request itself pays the spin-up.
          for i in 1 2 3; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 120 "$BASE/health" || echo 000)
            echo "attempt $i: $code"
            [ "$code" = "200" ] && exit 0
            sleep 10
          done
          echo "::warning::$BASE/health did not return 200 after 3 attempts (app may be down, not just cold)"
