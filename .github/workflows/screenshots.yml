name: screenshots

# Produces REVIEWABLE screenshots as a downloadable artifact. The e2e drivers in
# e2e/drive-*.mjs are headless Playwright scripts that boot nothing themselves —
# this job stands up the API + web, runs each driver, and uploads the PNGs. Needed
# because a real Chromium (with system libs) only exists on a CI runner, not in the
# local agent sandbox. Download from the run's "Artifacts" section to review.
on:
  workflow_dispatch: {}          # run on demand from the Actions tab
  push:
    branches: [main]
    paths: ['e2e/**', 'web/**', 'api/**']   # refresh shots when the app or drivers change

jobs:
  shots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '9.0.x' }
      - uses: actions/setup-node@v5
        with: { node-version: '20' }

      # Real browser + the OS libs the local sandbox lacks (libnspr4, libnss3, …).
      # playwright must be a LOCAL dep — the drivers `import { chromium } from
      # "playwright"`, and ESM resolves node_modules upward from e2e/, not globals.
      - name: Install Playwright + Chromium (with deps)
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm i --no-save playwright@latest
          npx --yes playwright install --with-deps chromium

      # Build the SPA and copy it into the API's wwwroot so the API serves the
      # app SAME-ORIGIN on :5180 (the API already has UseDefaultFiles/UseStaticFiles
      # + MapFallbackToFile("index.html")). Cross-origin :4200->:5180 was timing
      # the drivers out; same-origin removes that failure mode entirely.
      - name: Build web -> copy into api/wwwroot
        run: |
          (cd web && npm ci && npm run build)
          rm -rf api/wwwroot
          mkdir -p api/wwwroot
          cp -r web/dist/web/browser/. api/wwwroot/
          echo "wwwroot contents:"; ls -la api/wwwroot

      - name: Build + start API (serves SPA + API on :5180, background)
        working-directory: api
        run: |
          dotnet build -c Release
          (dotnet run -c Release --no-build --urls http://localhost:5180 &)
          # API ready
          for i in $(seq 1 40); do curl -sf http://localhost:5180/health && break || sleep 1; done
          # SPA index served same-origin
          for i in $(seq 1 30); do curl -sf http://localhost:5180/ >/dev/null && break || sleep 1; done

      - name: Run all e2e drivers -> /tmp/hfc-shots
        env:
          WEB_URL: http://localhost:5180
          API_BASE: http://localhost:5180
        run: |
          mkdir -p /tmp/hfc-shots
          for d in e2e/drive-*.mjs; do
            echo "=== $d ==="
            node "$d" "" /tmp/hfc-shots || echo "WARN: $d failed (continuing so other shots still upload)"
          done
          echo "Captured:"; ls -la /tmp/hfc-shots

      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hfc-screenshots
          path: /tmp/hfc-shots/*.png
          if-no-files-found: warn
          retention-days: 14
