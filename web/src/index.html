<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HFC Platform</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0B0F1A">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Signature type pairing: Space Grotesk (tabular hero numbers) + Inter (UI).
       System fallbacks in styles.css keep it legible if fonts are unavailable. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Optional runtime API base override; deploy.sh writes public/api-base.js
       pointing at the cloud API. Absent locally -> ApiService falls back to :5180. -->
  <script src="api-base.js"></script>
</head>
<body>
  <app-shell></app-shell>
</body>
</html>
