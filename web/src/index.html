<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HFC Platform</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1614">
  <!-- Brand favicon: HFC wordmark in the orange→amber brand gradient on the dark
       chrome (mirrors the in-app header mark). SVG for modern browsers, .ico
       (16/32/48) fallback, apple-touch-icon for iOS home-screen. -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <!-- No-flash theme boot: set data-theme on <html> BEFORE first paint.
       Priority: explicit user choice (localStorage) → OS prefers-color-scheme.
       Leaving data-theme unset would also work (CSS @media handles OS default),
       but setting it here lets matchMedia + the toggle share one source of truth. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('hfc-theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <!-- Signature type pairing: Space Grotesk (tabular hero numbers) + Inter (UI).
       System fallbacks in styles.css keep it legible if fonts are unavailable. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Optional runtime API base override; deploy.sh writes public/api-base.js
       pointing at the cloud API. Absent locally -> ApiService falls back to :5180. -->
  <script src="api-base.js"></script>
</head>
<body>
  <app-shell></app-shell>
</body>
</html>
